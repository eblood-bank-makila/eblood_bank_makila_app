name: eblood_bank_mak_app
description: "Application d'interconnection des banques de sang, hopitaux, donneurs"
publish_to: 'none' # Remove this line if you wish to publish to pub.dev
 
version: 1.0.0+1
 
environment:
  sdk: ^3.8.1 
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  get: ^4.6.6
  get_storage: ^2.1.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.1
  http: ^1.5.0
  dio: ^5.4.1
  device_info_plus: ^9.1.2
  flutter_dotenv: ^6.0.1
  flutter_spinkit: ^5.2.1
  flutter_launcher_icons: ^0.14.4
  sembast: ^3.7.2
  meta: ^1.15.0
  url_launcher: ^6.3.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.1
  permission_handler: ^11.3.1
  iconsax: ^0.0.8
  firebase_core: ^3.5.0
  firebase_messaging: ^15.1.2
  google_fonts: ^8.0.1
  flutter_local_notifications: ^17.2.3
  flutter_svg: ^2.0.10+1
  confetti: ^0.8.0
  ionicons: ^0.2.2
  shared_preferences: ^2.2.2
  shimmer: ^2.0.0
  flutter_secure_storage: ^9.2.4
  local_auth: ^2.3.0
  mobile_scanner: ^7.0.1
  path_provider: ^2.1.5
  path: ^1.9.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.1
  lottie: ^3.3.2
  connectivity_plus: ^6.0.5
  animate_do: ^4.2.0
  image_picker: ^1.0.7
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  share_plus: 7.1.0
  fl_chart: ^0.69.0
  csv: ^6.0.0
  flutter_pdfview: ^1.3.2
  # Sprint 15: open_file replaced with open_filex (the maintained
  # fork). lokotro_pay already pulls in open_filex transitively, and
  # both packages ship the same com.crazecoder.openfile.FileProvider
  # Java class — leaving both pinned causes a dex-merge collision on
  # Android (build fails at :app:mergeLibDexDebug).
  # open_file: ^3.3.2  # removed
  open_filex: ^4.7.0
  video_player: ^2.8.2
  chewie: ^1.7.5
  google_mlkit_face_detection: ^0.13.1
  google_mlkit_text_recognition: ^0.15.0
  google_mlkit_barcode_scanning: ^0.14.1
  pdf: ^3.11.3
  pin_code_fields: ^8.0.1
  sms_autofill: ^2.4.0
  web_socket_channel: ^3.0.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  lokotro_pay: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter 
  flutter_lints: ^5.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  custom_lint: ^0.7.3
  riverpod_lint: ^2.3.10
  freezed: ^2.4.7
  json_serializable: ^6.7.1

 
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
    - assets/logo/
    - assets/svg/
    - assets/animations/
    - assets/paymentmethods/
    - .env
  
